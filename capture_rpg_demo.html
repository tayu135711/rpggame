<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>捕獲RPGデモ</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#111; font-family:'Segoe UI', 'Hiragino Sans', sans-serif; }
  #canvas-container { width:100vw; height:100vh; display:block; }

  #hud {
    position:fixed; top:10px; left:10px; color:#fff;
    background:rgba(0,0,0,0.5); padding:10px 14px; border-radius:10px;
    font-size:13px; line-height:1.6; pointer-events:none;
  }
  #party-panel {
    position:fixed; top:10px; right:10px; width:220px;
    background:rgba(0,0,0,0.55); color:#fff; border-radius:10px;
    padding:10px 14px; font-size:13px;
  }
  #party-panel h3 { margin:0 0 6px 0; font-size:14px; border-bottom:1px solid #555; padding-bottom:4px; }
  .party-member { display:flex; align-items:center; gap:6px; margin:4px 0; }
  .party-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

  #battle-overlay {
    position:fixed; inset:0; background:rgba(10,10,20,0.92);
    display:none; align-items:center; justify-content:center; flex-direction:column;
    color:#fff; font-family:'Segoe UI', 'Hiragino Sans', sans-serif;
  }
  #battle-box {
    width:min(520px, 90vw); background:#1c1f2e; border:2px solid #4a4f6a;
    border-radius:14px; padding:24px; box-shadow:0 0 40px rgba(0,0,0,0.6);
  }
  #battle-title { font-size:18px; margin-bottom:14px; text-align:center; }
  .hpbar-wrap { margin-bottom:16px; }
  .hpbar-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .hpbar-outer { background:#333; border-radius:6px; height:14px; overflow:hidden; }
  .hpbar-inner { height:100%; background:linear-gradient(90deg,#5ee06a,#2fae3f); transition:width 0.3s; }
  .hpbar-inner.low { background:linear-gradient(90deg,#e0a05e,#c9622a); }
  .hpbar-inner.critical { background:linear-gradient(90deg,#e05e5e,#b02020); }
  #battle-log {
    background:#12141e; border-radius:8px; padding:10px; font-size:13px;
    height:64px; overflow-y:auto; margin-bottom:14px; color:#cfd2e0;
  }
  #battle-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .btn {
    background:#3a3f5c; color:#fff; border:none; padding:10px 18px;
    border-radius:8px; cursor:pointer; font-size:14px; transition:background 0.15s;
  }
  .btn:hover { background:#4d5378; }
  .btn.capture { background:#8a4fbf; }
  .btn.capture:hover { background:#a161d9; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  #catch-flash {
    position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none;
    transition:opacity 0.15s;
  }
  #toast {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.75); color:#fff; padding:10px 20px; border-radius:20px;
    font-size:14px; opacity:0; transition:opacity 0.3s; pointer-events:none;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
  移動: WASD / 矢印キー<br>
  敵シンボルに近づくとエンカウント
</div>

<div id="party-panel">
  <h3>パーティ (<span id="party-count">0</span>/6)</h3>
  <div id="party-list" style="color:#999;">まだ誰もいない…</div>
</div>

<div id="battle-overlay">
  <div id="battle-box">
    <div id="battle-title">やせいの ??? があらわれた！</div>

    <div class="hpbar-wrap">
      <div class="hpbar-label"><span id="enemy-name">敵</span><span id="enemy-hp-text">0/0</span></div>
      <div class="hpbar-outer"><div id="enemy-hpbar" class="hpbar-inner" style="width:100%"></div></div>
    </div>

    <div class="hpbar-wrap">
      <div class="hpbar-label"><span id="ally-name">あなた</span><span id="ally-hp-text">0/0</span></div>
      <div class="hpbar-outer"><div id="ally-hpbar" class="hpbar-inner" style="width:100%"></div></div>
    </div>

    <div id="battle-log">戦闘開始！</div>

    <div id="battle-actions">
      <button class="btn" id="btn-attack">こうげき</button>
      <button class="btn capture" id="btn-capture">つかまえる</button>
      <button class="btn" id="btn-switch">こうたい</button>
      <button class="btn" id="btn-run">にげる</button>
    </div>

    <div id="switch-panel" style="display:none; margin-top:14px;">
      <div style="font-size:13px; margin-bottom:6px; color:#cfd2e0;">だれと こうたいする？</div>
      <div id="switch-list" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
    </div>
  </div>
</div>

<div id="catch-flash"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   基本セットアップ
========================================================= */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fd0e8);
scene.fog = new THREE.Fog(0x8fd0e8, 30, 70);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ライト
const hemi = new THREE.HemisphereLight(0xffffff, 0x556b2f, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff6e0, 0.9);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30;
scene.add(sun);

// 地面
const groundGeo = new THREE.PlaneGeometry(80, 80, 40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color:0x6bbf59, flatShading:true });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// 装飾: 木・岩をランダム配置
function makeTree(x,z){
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.3,1.4,6), new THREE.MeshStandardMaterial({color:0x7a4a2a}));
  trunk.position.y = 0.7; trunk.castShadow = true;
  const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.3,2.4,7), new THREE.MeshStandardMaterial({color:0x2f8f3f, flatShading:true}));
  leaves.position.y = 2.2; leaves.castShadow = true;
  g.add(trunk, leaves);
  g.position.set(x,0,z);
  return g;
}
function makeRock(x,z){
  const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.6+Math.random()*0.4,0), new THREE.MeshStandardMaterial({color:0x999999, flatShading:true}));
  rock.position.set(x,0.4,z);
  rock.castShadow = true;
  return rock;
}
const obstacles = [];
for(let i=0;i<26;i++){
  const x = (Math.random()-0.5)*70;
  const z = (Math.random()-0.5)*70;
  if(Math.hypot(x,z) < 5) continue; // プレイヤー初期地点周りは空ける
  const obj = Math.random() < 0.6 ? makeTree(x,z) : makeRock(x,z);
  scene.add(obj);
  obstacles.push({x,z,r:1.0});
}

/* =========================================================
   プレイヤー
========================================================= */
const player = new THREE.Group();
const pBodyMat = new THREE.MeshStandardMaterial({color:0x2f6fd0});
const pTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,0.9,10), pBodyMat);
pTorso.position.y = 0.95; pTorso.castShadow = true;
const pHead = new THREE.Mesh(new THREE.SphereGeometry(0.5,10,10), pBodyMat);
pHead.position.y = 1.55; pHead.castShadow = true;
const pHat = new THREE.Mesh(new THREE.ConeGeometry(0.35,0.5,8), new THREE.MeshStandardMaterial({color:0xd03030}));
pHat.position.y = 2.05; pHat.castShadow = true;
player.add(pTorso, pHead, pHat);
player.position.set(0,0,0);
scene.add(player);

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

const PLAYER_SPEED = 6.5;
let playerAngle = 0;

/* =========================================================
   敵シンボル定義
========================================================= */
const ENEMY_TYPES = [
  { name:'スライム',   color:0x55d67a, geo:()=>new THREE.SphereGeometry(0.6,10,10), baseHp:30, atk:4, catchMod:1.3, scale:1.0 },
  { name:'コウモリ',   color:0x8855cc, geo:()=>new THREE.ConeGeometry(0.5,0.9,4),   baseHp:24, atk:5, catchMod:1.5, scale:1.0 },
  { name:'ロックゴーレム', color:0xaa8855, geo:()=>new THREE.BoxGeometry(1.1,1.1,1.1), baseHp:55, atk:8, catchMod:0.7, scale:1.0 },
  { name:'フレイムキャット', color:0xe0762a, geo:()=>new THREE.OctahedronGeometry(0.7,0), baseHp:38, atk:6, catchMod:1.0, scale:1.0 },
];

const enemies = []; // {mesh, type, hp, maxHp, alive, wanderTarget}

function spawnEnemy(x,z){
  const type = ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];
  const mat = new THREE.MeshStandardMaterial({ color:type.color, flatShading:true });
  const mesh = new THREE.Mesh(type.geo(), mat);
  mesh.position.set(x, 0.7, z);
  mesh.castShadow = true;
  scene.add(mesh);

  // 頭上にふわふわ浮く目印
  const marker = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8), new THREE.MeshBasicMaterial({color:0xffe45e}));
  marker.position.y = 1.3;
  mesh.add(marker);

  const enemy = {
    mesh, type,
    hp: type.baseHp, maxHp: type.baseHp,
    alive: true,
    wanderTarget: new THREE.Vector3(x,0,z),
    wanderTimer: 0,
  };
  enemies.push(enemy);
}

for(let i=0;i<10;i++){
  let x,z;
  do { x=(Math.random()-0.5)*60; z=(Math.random()-0.5)*60; } while(Math.hypot(x,z) < 8);
  spawnEnemy(x,z);
}

/* =========================================================
   パーティ管理
========================================================= */
const TRAINER = { name:'あなた', color:0x2f6fd0, hp:40, maxHp:40, atk:7, isTrainer:true };
const party = []; // {name, color, hp, maxHp, atk}
const MAX_PARTY = 6;

function getAllFighters(){ return [TRAINER, ...party]; }

function updatePartyPanel(){
  document.getElementById('party-count').textContent = party.length;
  const list = document.getElementById('party-list');
  const rows = getAllFighters().map(p => `
    <div class="party-member">
      <div class="party-dot" style="background:#${p.color.toString(16).padStart(6,'0')}"></div>
      <span>${p.name}${p.hp<=0?' (ひんし)':''}</span>
    </div>
  `).join('');
  list.innerHTML = rows || '<span style="color:#999;">まだ誰もいない…</span>';
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=> t.style.opacity = '0', 2200);
}

/* =========================================================
   バトルシステム
========================================================= */
let battleState = null; // {enemy, fighter}
const ENCOUNTER_DIST = 1.6;

const overlay = document.getElementById('battle-overlay');
const btnAttack = document.getElementById('btn-attack');
const btnCapture = document.getElementById('btn-capture');
const btnSwitch = document.getElementById('btn-switch');
const btnRun = document.getElementById('btn-run');
const battleLog = document.getElementById('battle-log');
const switchPanel = document.getElementById('switch-panel');

function log(msg){
  battleLog.innerHTML += `<div>${msg}</div>`;
  battleLog.scrollTop = battleLog.scrollHeight;
}

function pickInitialFighter(){
  return getAllFighters().find(f => f.hp > 0) || null;
}

function startBattle(enemy){
  const fighter = pickInitialFighter();
  if(!fighter){
    showToast('戦えるなかまがいない…');
    return;
  }
  battleState = { enemy, fighter };
  document.getElementById('battle-title').textContent = `やせいの ${enemy.type.name} があらわれた！`;
  document.getElementById('enemy-name').textContent = enemy.type.name;
  battleLog.innerHTML = '戦闘開始！';
  switchPanel.style.display = 'none';
  updateHpBar();
  updateAllyBar();
  overlay.style.display = 'flex';
  btnAttack.disabled = false;
  btnCapture.disabled = false;
  btnSwitch.disabled = false;
  btnRun.disabled = false;
}

function updateHpBar(){
  const e = battleState.enemy;
  const pct = Math.max(0, e.hp / e.maxHp);
  const bar = document.getElementById('enemy-hpbar');
  bar.style.width = (pct*100) + '%';
  bar.className = 'hpbar-inner' + (pct < 0.25 ? ' critical' : pct < 0.5 ? ' low' : '');
  document.getElementById('enemy-hp-text').textContent = `${Math.max(0,Math.ceil(e.hp))}/${e.maxHp}`;
}

function updateAllyBar(){
  const f = battleState.fighter;
  document.getElementById('ally-name').textContent = f.name;
  const pct = Math.max(0, f.hp / f.maxHp);
  const bar = document.getElementById('ally-hpbar');
  bar.style.width = (pct*100) + '%';
  bar.className = 'hpbar-inner' + (pct < 0.25 ? ' critical' : pct < 0.5 ? ' low' : '');
  document.getElementById('ally-hp-text').textContent = `${Math.max(0,Math.ceil(f.hp))}/${f.maxHp}`;
}

function endBattle(){
  overlay.style.display = 'none';
  switchPanel.style.display = 'none';
  battleState = null;
  updatePartyPanel();
}

function enemyCounterattack(){
  if(!battleState) return;
  const e = battleState.enemy;
  const f = battleState.fighter;
  const dmg = Math.max(1, Math.round((e.type.atk||5) * (0.8 + Math.random()*0.4)));
  f.hp = Math.max(0, f.hp - dmg);
  log(`${e.type.name} の こうげき！ ${f.name} に ${dmg} のダメージ！`);
  updateAllyBar();
  if(f.hp <= 0){
    log(`${f.name} は たおれた！`);
    handleFighterFaint();
  }
}

function handleFighterFaint(){
  const next = getAllFighters().find(f => f.hp > 0 && f !== battleState.fighter);
  updatePartyPanel();
  if(next){
    log('つぎの なかまと こうたいしてください。');
    btnAttack.disabled = true;
    btnCapture.disabled = true;
    openSwitchPanel();
  } else {
    log('みんな たおれてしまった…にげるしかない！');
    btnAttack.disabled = true;
    btnCapture.disabled = true;
    btnSwitch.disabled = true;
    setTimeout(endBattle, 1400);
  }
}

function openSwitchPanel(){
  if(!battleState) return;
  const options = getAllFighters().filter(f => f.hp > 0 && f !== battleState.fighter);
  const listEl = document.getElementById('switch-list');
  if(options.length === 0){
    log('こうたいできる なかまがいない！');
    return;
  }
  listEl.innerHTML = '';
  options.forEach(f => {
    const b = document.createElement('button');
    b.className = 'btn';
    b.style.background = '#' + f.color.toString(16).padStart(6,'0');
    b.textContent = `${f.name} (${Math.ceil(f.hp)}/${f.maxHp})`;
    b.addEventListener('click', () => {
      battleState.fighter = f;
      log(`${f.name} が でてきた！`);
      updateAllyBar();
      switchPanel.style.display = 'none';
      btnAttack.disabled = false;
      btnCapture.disabled = false;
    });
    listEl.appendChild(b);
  });
  switchPanel.style.display = 'block';
}

btnAttack.addEventListener('click', () => {
  if(!battleState) return;
  const e = battleState.enemy;
  const f = battleState.fighter;
  const dmg = Math.max(1, Math.round(f.atk + Math.random()*5));
  e.hp -= dmg;
  log(`${f.name} の こうげき！ ${e.type.name} に ${dmg} のダメージ！`);
  updateHpBar();
  if(e.hp <= 0){
    log(`${e.type.name} をたおした！`);
    e.alive = false;
    scene.remove(e.mesh);
    setTimeout(endBattle, 900);
    return;
  }
  enemyCounterattack();
});

btnCapture.addEventListener('click', () => {
  if(!battleState) return;
  const e = battleState.enemy;
  if(party.length >= MAX_PARTY){
    log('パーティがいっぱいだ！これ以上つかまえられない。');
    return;
  }
  const hpPct = Math.max(0, e.hp / e.maxHp);
  // HPが低いほど、また捕獲難易度(catchMod)が高いほど成功しやすい
  const baseChance = 0.15 + (1 - hpPct) * 0.65;
  const chance = Math.min(0.95, baseChance * e.type.catchMod);
  log(`ボールをなげた！ (成功率 約${Math.round(chance*100)}%)`);

  document.getElementById('catch-flash').style.opacity = '0.6';
  setTimeout(()=> document.getElementById('catch-flash').style.opacity = '0', 150);

  const success = Math.random() < chance;
  setTimeout(() => {
    if(!battleState) return;
    if(success){
      log(`やった！ ${e.type.name} をつかまえた！`);
      party.push({
        name: e.type.name,
        color: e.type.color,
        hp: Math.round(e.type.baseHp * 0.8),
        maxHp: e.type.baseHp,
        atk: Math.round(4 + e.type.baseHp / 10),
      });
      updatePartyPanel();
      showToast(`${e.type.name} が なかまになった！`);
      e.alive = false;
      scene.remove(e.mesh);
      setTimeout(endBattle, 900);
    } else {
      log(`あ！ボールから ${e.type.name} が でてしまった…`);
      enemyCounterattack();
    }
  }, 500);
});

btnSwitch.addEventListener('click', () => {
  if(!battleState) return;
  openSwitchPanel();
});

btnRun.addEventListener('click', () => {
  log('うまく にげきれた！');
  setTimeout(endBattle, 500);
});

/* =========================================================
   カメラ追従(見下ろし)
========================================================= */
function updateCamera(){
  const camOffset = new THREE.Vector3(0, 9, 7);
  const targetPos = player.position.clone().add(camOffset);
  camera.position.lerp(targetPos, 0.12);
  camera.lookAt(player.position.clone().add(new THREE.Vector3(0,0.6,0)));
}

/* =========================================================
   メインループ
========================================================= */
const clock = new THREE.Clock();

function checkCollision(x,z, radius){
  for(const o of obstacles){
    if(Math.hypot(x-o.x, z-o.z) < radius + o.r) return true;
  }
  return false;
}

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if(!battleState){
    // プレイヤー移動
    let dx=0, dz=0;
    if(keys['w']||keys['arrowup']) dz -= 1;
    if(keys['s']||keys['arrowdown']) dz += 1;
    if(keys['a']||keys['arrowleft']) dx -= 1;
    if(keys['d']||keys['arrowright']) dx += 1;

    if(dx!==0 || dz!==0){
      const len = Math.hypot(dx,dz);
      dx/=len; dz/=len;
      const nx = player.position.x + dx*PLAYER_SPEED*dt;
      const nz = player.position.z + dz*PLAYER_SPEED*dt;
      if(!checkCollision(nx,nz,0.5)){
        player.position.x = nx;
        player.position.z = nz;
      }
      playerAngle = Math.atan2(dx,dz);
      player.rotation.y = playerAngle;
    }

    // 敵の徘徊
    for(const e of enemies){
      if(!e.alive) continue;
      e.wanderTimer -= dt;
      if(e.wanderTimer <= 0){
        e.wanderTimer = 2 + Math.random()*3;
        e.wanderTarget.set(
          e.mesh.position.x + (Math.random()-0.5)*6,
          0,
          e.mesh.position.z + (Math.random()-0.5)*6
        );
      }
      const dir = new THREE.Vector3(e.wanderTarget.x - e.mesh.position.x, 0, e.wanderTarget.z - e.mesh.position.z);
      if(dir.length() > 0.1){
        dir.normalize();
        e.mesh.position.x += dir.x * 1.2 * dt;
        e.mesh.position.z += dir.z * 1.2 * dt;
      }
      e.mesh.rotation.y += dt * 0.8;
      e.mesh.position.y = 0.7 + Math.sin(performance.now()/400 + e.mesh.id) * 0.08;

      // エンカウント判定
      const dist = Math.hypot(player.position.x - e.mesh.position.x, player.position.z - e.mesh.position.z);
      if(dist < ENCOUNTER_DIST){
        startBattle(e);
      }
    }
  }

  updateCamera();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
