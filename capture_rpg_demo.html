<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>捕獲RPGデモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2b1810;
    --paper: #fffaf0;
    --cream: #fbecc8;
    --red: #c8362a;
    --gold: #c98a2b;
    --green: #4a7c3f;
    --plum: #6b3a5c;
    --notch: 14px;
  }
  html, body {
    margin:0; padding:0; overflow:hidden;
    background:#bfe3ff;
    font-family:'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', 'Hiragino Sans', sans-serif;
  }
  .display { font-family:'Mochiy Pop One', 'Hiragino Maru Gothic ProN', sans-serif; }
  #canvas-container { width:100vw; height:100vh; display:block; }

  /* 共通の「かどを切った紙」パネル(このゲームの署名スタイル) */
  .tag-panel {
    background:var(--paper);
    border:2.5px solid var(--ink);
    clip-path: polygon(0 0, calc(100% - var(--notch)) 0, 100% var(--notch), 100% 100%, var(--notch) 100%, 0 calc(100% - var(--notch)));
    box-shadow: 4px 4px 0 var(--ink);
  }

  #hud {
    position:fixed; top:14px; left:14px; color:var(--ink);
    padding:10px 16px;
    font-size:13px; font-weight:700; line-height:1.7; pointer-events:none;
  }
  #party-panel {
    position:fixed; top:14px; right:14px; width:220px;
    color:var(--ink);
    padding:12px 16px; font-size:13px;
  }
  #party-panel h3 {
    margin:0 0 8px 0; font-size:15px; font-weight:400; color:var(--red);
    border-bottom:2px dashed var(--ink); padding-bottom:6px;
  }
  .party-member { display:flex; align-items:center; gap:6px; margin:5px 0; font-weight:700; }
  .party-dot { width:12px; height:12px; flex-shrink:0; border:2px solid var(--ink); }

  #battle-overlay {
    position:fixed; inset:0; z-index:30;
    background: linear-gradient(180deg, #6b8fae 0%, #a8c8dc 55%, #cfe0c4 100%);
    display:none; align-items:center; justify-content:center; flex-direction:column;
    color:var(--ink); font-family:'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
  }
  #battle-box {
    width:min(560px, 92vw); padding:20px;
  }
  #battle-title { font-size:18px; font-weight:400; margin-bottom:10px; text-align:center; color:var(--red); }

  #battle-stage-wrap {
    width:100%; height:210px; overflow:hidden; margin-bottom:14px;
    border:2.5px solid var(--ink);
    background: linear-gradient(180deg,#bfe3ff 0%, #eaf7ff 55%, #d8f0c8 100%);
  }
  #battle-canvas { width:100%; height:100%; display:block; }

  .hpbar-wrap { margin-bottom:10px; }
  .hpbar-label { display:flex; justify-content:space-between; font-size:13px; font-weight:800; margin-bottom:4px; color:var(--ink); }
  .hpbar-outer { background:#e6d8b8; height:13px; overflow:hidden; border:2px solid var(--ink); }
  .hpbar-inner { height:100%; background:var(--green); transition:width 0.3s; }
  .hpbar-inner.low { background:var(--gold); }
  .hpbar-inner.critical { background:var(--red); }

  #ally-hp-list { display:flex; gap:8px; overflow-x:auto; margin-bottom:12px; padding-bottom:2px; }
  .ally-card {
    flex:0 0 auto; width:96px; background:var(--paper); border:2px solid var(--ink);
    padding:8px 6px; text-align:center;
  }
  .ally-card.fainted { opacity:0.4; }
  .ally-card-dot { width:12px; height:12px; margin:0 auto 4px; border:2px solid var(--ink); }
  .ally-card-name { font-size:11px; font-weight:800; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
  .ally-card .hpbar-outer { height:7px; margin-bottom:4px; }
  .ally-card-atk { font-size:10px; color:var(--ink); opacity:0.65; font-weight:700; }

  #battle-log {
    background:var(--paper); border:2px solid var(--ink); padding:10px; font-size:13px; font-weight:700;
    height:52px; overflow-y:auto; color:var(--ink); opacity:0.85;
  }
  #battle-actions { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .btn {
    background:#4a7ca8; color:#fff; border:2.5px solid var(--ink);
    padding:11px 20px; cursor:pointer; font-size:14px; font-weight:800;
    font-family:inherit; transition:transform 0.08s;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .btn.cmd {
    width:100%; display:flex; align-items:center; gap:12px; justify-content:flex-start;
    padding:12px 18px; font-size:15px; background:var(--red);
  }
  .cmd-icon { flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .icon-attack { width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:14px solid #fff; }
  .icon-capture { width:16px; height:16px; border-radius:50%; border:3px solid #fff; position:relative; }
  .icon-capture::after { content:''; position:absolute; inset:5px; border-radius:50%; background:#fff; }
  .icon-run { width:14px; height:14px; border-top:3px solid #fff; border-right:3px solid #fff; transform:rotate(45deg); }
  .btn:hover { filter:brightness(1.08); }
  .btn:active { transform:translate(3px,3px); box-shadow:0 0 0 var(--ink); }
  .btn.capture { background:var(--plum); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

  #hud, #party-panel { display:none; }

  #island-overlay {
    position:fixed; inset:0; z-index:20;
    background: linear-gradient(180deg,#6fa8c8 0%, #a8d0dc 55%, #dceecc 100%);
    display:flex; align-items:center; justify-content:center;
    font-family:'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
  }
  #island-canvas-wrap { width:min(520px,80vw); height:min(520px,58vh); }
  #island-canvas { width:100%; height:100%; display:block; }
  #island-title {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    font-size:19px; font-weight:400; color:var(--ink);
    padding:9px 24px;
  }
  #island-hint {
    position:absolute; top:68px; left:50%; transform:translateX(-50%);
    font-size:12px; font-weight:700; color:var(--ink);
    background:rgba(255,250,240,0.85); border:1.5px solid var(--ink);
    padding:4px 14px;
  }
  #stage-dots {
    position:absolute; right:20px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:9px;
  }
  .stage-dot {
    width:38px; height:38px; border:2.5px solid var(--ink);
    background:var(--gold); color:#fff; font-weight:800; font-size:14px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:3px 3px 0 var(--ink); transition:transform 0.08s;
  }
  .stage-dot.locked { background:#9a9086; }
  .stage-dot.selected { outline:3px solid var(--red); outline-offset:1px; }
  .stage-dot:hover { transform:translate(-2px,-2px); }

  #stage-card {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    padding:14px 22px; text-align:center;
    width:min(300px,80vw); display:none;
  }
  #stage-card-icon {
    width:44px; height:44px; margin:0 auto 6px; border:2.5px solid var(--ink);
    background:var(--red); color:#fff; font-size:18px; font-weight:400;
    display:flex; align-items:center; justify-content:center;
  }
  #stage-card-name { font-weight:400; font-size:15px; color:var(--ink); margin:4px 0; }
  #stage-card-desc { font-size:12px; color:var(--ink); opacity:0.65; margin-bottom:10px; }

  #island-currency {
    position:absolute; top:20px; left:20px;
    display:flex; gap:10px;
  }
  .currency-badge {
    display:flex; align-items:center; gap:6px;
    background:var(--paper); border:2px solid var(--ink);
    padding:6px 14px; font-weight:800; font-size:13px; color:var(--ink);
    box-shadow:3px 3px 0 var(--ink);
  }
  .icon-diamond { width:10px; height:10px; background:#4fa8d8; border:1.5px solid var(--ink); transform:rotate(45deg); }
  .icon-coin { width:12px; height:12px; border-radius:50%; background:var(--gold); border:1.5px solid var(--ink); }
  #island-menu-buttons {
    position:absolute; top:20px; right:20px;
    display:flex; flex-direction:column; gap:8px;
  }
  #island-menu-buttons .btn { font-size:13px; padding:9px 16px; background:var(--plum); }

  #gacha-modal, #party-modal {
    position:fixed; inset:0; z-index:40; display:none;
    align-items:center; justify-content:center;
    background:rgba(43,24,16,0.55);
    font-family:'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
  }
  #gacha-box, #party-box {
    width:min(360px, 88vw); padding:20px; text-align:center;
  }
  .modal-title { font-size:17px; font-weight:400; color:var(--plum); margin-bottom:12px; }
  #gacha-tabs { display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  #gacha-tabs .btn { font-size:12px; padding:8px 12px; background:#4a7ca8; }
  #gacha-result {
    min-height:64px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-weight:800; color:var(--ink); margin-bottom:14px; font-size:14px; line-height:1.5;
  }
  #party-roster { max-height:260px; overflow-y:auto; margin-bottom:14px; text-align:left; }
  .roster-row {
    display:flex; align-items:center; gap:10px; padding:8px 6px; border-bottom:2px dashed var(--ink);
  }
  .roster-dot { width:14px; height:14px; flex-shrink:0; border:2px solid var(--ink); }
  .roster-name { font-weight:800; color:var(--ink); width:110px; flex-shrink:0; }
  .roster-stats { font-size:12px; color:var(--ink); opacity:0.65; }

  #catch-flash {
    position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none;
    transition:opacity 0.15s;
  }
  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:11px 22px;
    font-size:14px; font-weight:700; opacity:0; transition:opacity 0.3s; pointer-events:none;
    border:2px solid var(--paper); box-shadow:3px 3px 0 rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud" class="tag-panel">
  移動: WASD / 矢印キー<br>
  敵シンボルに近づくとエンカウント
</div>

<div id="party-panel" class="tag-panel">
  <h3>パーティ (<span id="party-count">0</span>/6)</h3>
  <div id="party-list" style="color:#999;">まだ誰もいない…</div>
</div>

<div id="battle-overlay">
  <div id="battle-box" class="tag-panel">
    <div id="battle-title" class="display">やせいの ??? があらわれた！</div>

    <div id="battle-stage-wrap">
      <canvas id="battle-canvas"></canvas>
    </div>

    <div class="hpbar-wrap">
      <div class="hpbar-label"><span id="enemy-name">敵</span><span id="enemy-hp-text">0/0</span></div>
      <div class="hpbar-outer"><div id="enemy-hpbar" class="hpbar-inner" style="width:100%"></div></div>
    </div>

    <div id="battle-actions">
      <button class="btn cmd" id="btn-attack"><span class="cmd-icon icon-attack"></span>こうげき(全員)</button>
      <button class="btn cmd capture" id="btn-capture"><span class="cmd-icon icon-capture"></span>つかまえる</button>
      <button class="btn cmd" id="btn-run"><span class="cmd-icon icon-run"></span>にげる</button>
    </div>

    <div id="ally-hp-list"></div>

    <div id="battle-log">戦闘開始！</div>
  </div>
</div>

<div id="island-overlay">
  <div id="island-title" class="tag-panel display">しまマップ</div>
  <div id="island-hint">WASD / 矢印キー で あるける</div>
  <div id="island-currency">
    <div class="currency-badge"><span class="icon-diamond"></span> <span id="diamond-count">0</span></div>
    <div class="currency-badge"><span class="icon-coin"></span> <span id="coin-count">0</span></div>
  </div>
  <div id="island-menu-buttons">
    <button class="btn" id="btn-open-gacha">ガチャ</button>
    <button class="btn" id="btn-open-party">パーティ</button>
  </div>
  <div id="island-canvas-wrap">
    <canvas id="island-canvas"></canvas>
  </div>
  <div id="stage-dots"></div>
  <div id="stage-card" class="tag-panel">
    <div id="stage-card-icon">?</div>
    <div id="stage-card-name">ステージ1</div>
    <div id="stage-card-desc"></div>
    <button class="btn" id="btn-depart">出発する</button>
  </div>
</div>

<div id="gacha-modal">
  <div id="gacha-box" class="tag-panel">
    <div class="modal-title display">ガチャ</div>
    <div id="gacha-tabs">
      <button class="btn" id="tab-denpa">でんぱガチャ (ダイヤ5)</button>
      <button class="btn" id="tab-equip">そうびガチャ (コイン30)</button>
    </div>
    <div id="gacha-result">でんぱガチャ: でんぱ人間が1体でてくるよ</div>
    <button class="btn capture" id="btn-gacha-pull">ひく</button>
    <button class="btn" id="btn-gacha-close">とじる</button>
  </div>
</div>

<div id="party-modal">
  <div id="party-box" class="tag-panel">
    <div class="modal-title display">パーティへんせい</div>
    <div id="party-roster"></div>
    <button class="btn" id="btn-party-close">とじる</button>
  </div>
</div>

<div id="catch-flash"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   基本セットアップ(フィールド)
========================================================= */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fd0e8);
scene.fog = new THREE.Fog(0x8fd0e8, 30, 70);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 200);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  resizeBattleCanvas();
  resizeIslandCanvas();
});

const hemi = new THREE.HemisphereLight(0xffffff, 0x556b2f, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff6e0, 0.9);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30;
scene.add(sun);

const groundGeo = new THREE.PlaneGeometry(70, 70, 20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color:0x6b5d4f, flatShading:true });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

function makeRock(x,z){
  const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.6+Math.random()*0.4,0), new THREE.MeshStandardMaterial({color:0x8a8378, flatShading:true}));
  rock.position.set(x,0.4,z);
  rock.castShadow = true;
  return rock;
}
const obstacles = []; // 丸型の障害物(装飾の岩など)用。迷路の壁は別途mazeWallCollidersで管理

/* =========================================================
   迷路生成(ステージ用の洞窟マップ)
========================================================= */
const MAZE_COLS = 9, MAZE_ROWS = 9, CELL = 5;
const WALL_HEIGHT = 3.2, WALL_THICKNESS = 0.5;
const wallMat = new THREE.MeshStandardMaterial({ color:0x8a7863, flatShading:true, roughness:1 });

let mazeWallMeshes = [];
let mazeWallColliders = [];
let stageDecorations = [];
let chests = [];

function buildChest(){
  const g = new THREE.Group();
  const woodMat = new THREE.MeshStandardMaterial({color:0x8a5a2a, flatShading:true});
  const trimMat = new THREE.MeshStandardMaterial({color:0xd9a13c, flatShading:true});

  const base = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.4,0.46), woodMat);
  base.position.y = 0.2;
  base.castShadow = true;
  g.add(base);

  const lid = new THREE.Mesh(new THREE.BoxGeometry(0.72,0.22,0.48), woodMat);
  lid.position.y = 0.51;
  lid.castShadow = true;
  g.add(lid);

  const band1 = new THREE.Mesh(new THREE.BoxGeometry(0.74,0.06,0.5), trimMat);
  band1.position.y = 0.2;
  g.add(band1);
  const band2 = new THREE.Mesh(new THREE.BoxGeometry(0.74,0.06,0.5), trimMat);
  band2.position.y = 0.51;
  g.add(band2);

  const lock = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.14,0.06), trimMat);
  lock.position.set(0,0.35,0.25);
  g.add(lock);

  return g;
}

function spawnChest(x,z){
  const mesh = buildChest();
  mesh.position.set(x,0,z);
  scene.add(mesh);
  const marker = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8), new THREE.MeshBasicMaterial({color:0xffe45e}));
  marker.position.y = 1.0;
  mesh.add(marker);
  chests.push({ mesh, opened:false });
}

function openChest(chest){
  if(chest.opened) return;
  chest.opened = true;
  scene.remove(chest.mesh);
  const gotCoins = 10 + Math.floor(Math.random()*21);
  coins += gotCoins;
  let msg = `たからばこを あけた！ コイン+${gotCoins}`;
  if(Math.random() < 0.3){
    const gotDia = 2 + Math.floor(Math.random()*4);
    diamonds += gotDia;
    msg += ` ダイヤ+${gotDia}`;
  }
  updateCurrencyUI();
  showToast(msg);
}

function cellToWorldX(c){ return (c - (MAZE_COLS-1)/2) * CELL; }
function cellToWorldZ(r){ return (r - (MAZE_ROWS-1)/2) * CELL; }

function generateMaze(cols, rows){
  const grid = [];
  for(let r=0;r<rows;r++){
    const row = [];
    for(let c=0;c<cols;c++){
      row.push({ visited:false, walls:{N:true,S:true,E:true,W:true} });
    }
    grid.push(row);
  }
  const dirs = [
    {name:'N', dr:-1, dc:0, opp:'S'},
    {name:'S', dr:1, dc:0, opp:'N'},
    {name:'E', dr:0, dc:1, opp:'W'},
    {name:'W', dr:0, dc:-1, opp:'E'},
  ];
  const stack = [{r:0,c:0}];
  grid[0][0].visited = true;
  while(stack.length){
    const cur = stack[stack.length-1];
    const neighbors = [];
    for(const d of dirs){
      const nr = cur.r+d.dr, nc = cur.c+d.dc;
      if(nr>=0 && nr<rows && nc>=0 && nc<cols && !grid[nr][nc].visited){
        neighbors.push({r:nr,c:nc,dir:d});
      }
    }
    if(neighbors.length){
      const next = neighbors[Math.floor(Math.random()*neighbors.length)];
      grid[cur.r][cur.c].walls[next.dir.name] = false;
      grid[next.r][next.c].walls[next.dir.opp] = false;
      grid[next.r][next.c].visited = true;
      stack.push({r:next.r, c:next.c});
    } else {
      stack.pop();
    }
  }
  return grid;
}

function findFarthestCell(grid, cols, rows){
  const dist = grid.map(row => row.map(() => -1));
  const queue = [{r:0,c:0}];
  dist[0][0] = 0;
  let farthest = {r:0, c:0, d:0};
  while(queue.length){
    const cur = queue.shift();
    const d = dist[cur.r][cur.c];
    if(d > farthest.d) farthest = {r:cur.r, c:cur.c, d};
    const cell = grid[cur.r][cur.c];
    const moves = [];
    if(!cell.walls.N) moves.push({r:cur.r-1, c:cur.c});
    if(!cell.walls.S) moves.push({r:cur.r+1, c:cur.c});
    if(!cell.walls.E) moves.push({r:cur.r, c:cur.c+1});
    if(!cell.walls.W) moves.push({r:cur.r, c:cur.c-1});
    for(const m of moves){
      if(dist[m.r][m.c] === -1){
        dist[m.r][m.c] = d+1;
        queue.push(m);
      }
    }
  }
  return farthest;
}

function addWallSegment(cx, cz, width, depth){
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, WALL_HEIGHT, depth), wallMat);
  mesh.position.set(cx, WALL_HEIGHT/2, cz);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  mazeWallMeshes.push(mesh);
  mazeWallColliders.push({ minX:cx-width/2, maxX:cx+width/2, minZ:cz-depth/2, maxZ:cz+depth/2 });
}

function collidesWithWalls(x, z, radius){
  for(const w of mazeWallColliders){
    const cx = Math.max(w.minX, Math.min(x, w.maxX));
    const cz = Math.max(w.minZ, Math.min(z, w.maxZ));
    const dx = x-cx, dz = z-cz;
    if(dx*dx + dz*dz < radius*radius) return true;
  }
  return false;
}

function clearStageObjects(){
  mazeWallMeshes.forEach(m => scene.remove(m));
  mazeWallMeshes = [];
  mazeWallColliders = [];
  enemies.forEach(e => { if(e.mesh) scene.remove(e.mesh); });
  enemies.length = 0;
  stageDecorations.forEach(d => scene.remove(d));
  stageDecorations = [];
  chests.forEach(c => { if(c.mesh) scene.remove(c.mesh); });
  chests = [];
}

function spawnBoss(x, z){

function setupStage1(){
  clearStageObjects();
  const grid = generateMaze(MAZE_COLS, MAZE_ROWS);
  const bossCell = findFarthestCell(grid, MAZE_COLS, MAZE_ROWS);

  for(let r=0;r<MAZE_ROWS;r++){
    for(let c=0;c<MAZE_COLS;c++){
      const cell = grid[r][c];
      const cx = cellToWorldX(c), cz = cellToWorldZ(r);
      if(cell.walls.N) addWallSegment(cx, cz-CELL/2, CELL, WALL_THICKNESS);
      if(cell.walls.S) addWallSegment(cx, cz+CELL/2, CELL, WALL_THICKNESS);
      if(cell.walls.E) addWallSegment(cx+CELL/2, cz, WALL_THICKNESS, CELL);
      if(cell.walls.W) addWallSegment(cx-CELL/2, cz, WALL_THICKNESS, CELL);
    }
  }

  const startX = cellToWorldX(0), startZ = cellToWorldZ(0);
  player.position.set(startX, 0, startZ);
  player.rotation.y = 0;
  fieldPartyModels.forEach((m,i) => {
    m.position.set(startX, 0, startZ - 1.3*(i+1));
  });

  const usedCells = new Set([`0,0`, `${bossCell.r},${bossCell.c}`]);
  let spawned = 0;
  let guard = 0;
  while(spawned < 5 && guard < 500){
    guard++;
    const r = Math.floor(Math.random()*MAZE_ROWS);
    const c = Math.floor(Math.random()*MAZE_COLS);
    const key = `${r},${c}`;
    if(usedCells.has(key)) continue;
    usedCells.add(key);
    spawnEnemy(cellToWorldX(c), cellToWorldZ(r));
    spawned++;
  }

  spawnBoss(cellToWorldX(bossCell.c), cellToWorldZ(bossCell.r));

  const chestUsed = new Set([`0,0`, `${bossCell.r},${bossCell.c}`]);
  let chestSpawned = 0, chestGuard = 0;
  while(chestSpawned < 3 && chestGuard < 500){
    chestGuard++;
    const r = Math.floor(Math.random()*MAZE_ROWS);
    const c = Math.floor(Math.random()*MAZE_COLS);
    const key = `${r},${c}`;
    if(chestUsed.has(key)) continue;
    chestUsed.add(key);
    spawnChest(cellToWorldX(c), cellToWorldZ(r));
    chestSpawned++;
  }

  // 洞窟の雰囲気づくり: 通路の隅にたまに岩を置く(あたり判定なしの装飾)
  for(let i=0;i<10;i++){
    const r = Math.floor(Math.random()*MAZE_ROWS);
    const c = Math.floor(Math.random()*MAZE_COLS);
    const rock = makeRock(cellToWorldX(c)+(Math.random()-0.5)*1.5, cellToWorldZ(r)+(Math.random()-0.5)*1.5);
    rock.scale.setScalar(0.6);
    scene.add(rock);
    stageDecorations.push(rock);
  }
}

// 歩いている間だけ腕と脚を振り、止まったら自然に戻す
function updateWalkAnimation(group, dt, moving){
  if(!group || !group.userData.legL) return;
  const u = group.userData;
  if(moving){
    u.walkPhase += dt * 9;
    const swing = Math.sin(u.walkPhase) * 0.55;
    u.legL.rotation.x = swing;
    u.legR.rotation.x = -swing;
    u.armL.rotation.x = -swing * 0.8;
    u.armR.rotation.x = swing * 0.8;
  } else {
    u.legL.rotation.x *= 0.8;
    u.legR.rotation.x *= 0.8;
    u.armL.rotation.x *= 0.8;
    u.armR.rotation.x *= 0.8;
  }
}

const ISLAND_RADIUS = 3.0;
const ISLAND_PLAYER_SPEED = 4.5;

function updateIslandPlayer(dt){
  let dx=0, dz=0;
  if(keys['w']||keys['arrowup']) dz -= 1;
  if(keys['s']||keys['arrowdown']) dz += 1;
  if(keys['a']||keys['arrowleft']) dx -= 1;
  if(keys['d']||keys['arrowright']) dx += 1;

  if(dx!==0 || dz!==0){
    const len = Math.hypot(dx,dz);
    dx/=len; dz/=len;
    let nx = islandPlayer.position.x + dx*ISLAND_PLAYER_SPEED*dt;
    let nz = islandPlayer.position.z + dz*ISLAND_PLAYER_SPEED*dt;
    const dist = Math.hypot(nx,nz);
    if(dist > ISLAND_RADIUS){
      const s = ISLAND_RADIUS/dist;
      nx *= s; nz *= s;
    }
    islandPlayer.position.x = nx;
    islandPlayer.position.z = nz;
    islandPlayer.rotation.y = Math.atan2(dx,dz);
  }
  updateWalkAnimation(islandPlayer, dt, dx!==0 || dz!==0);

  const camOffset = new THREE.Vector3(0, 2.5, 3.1);
  const targetPos = islandPlayer.position.clone().add(camOffset);
  islandCamera.position.lerp(targetPos, 0.1);
  islandCamera.lookAt(islandPlayer.position.clone().add(new THREE.Vector3(0,0.35,0)));
}

  [-0.18,0.18].forEach(ex=>{
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8), eyeMat);
    eye.position.set(ex,0.68,0.58);
    g.add(eye);
  });
  return g;
}

function buildDonutRing(){
  const g = new THREE.Group();
  const donut = new THREE.Mesh(new THREE.TorusGeometry(0.55,0.28,10,20), new THREE.MeshStandardMaterial({color:0xe8a0c0, flatShading:true}));
  donut.rotation.x = Math.PI/2;
  donut.position.y = 0.5;
  donut.castShadow = true;
  g.add(donut);

  const sprinkleColors = [0xffe45e,0x5ed6ff,0x7bd67a,0xff6f91,0xffffff];
  for(let i=0;i<14;i++){
    const angle = Math.random()*Math.PI*2;
    const radius = 0.3+Math.random()*0.5;
    const spr = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.12,5), new THREE.MeshStandardMaterial({color:sprinkleColors[i%sprinkleColors.length]}));
    spr.position.set(Math.cos(angle)*radius, 0.68+Math.random()*0.08, Math.sin(angle)*radius);
    spr.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    g.add(spr);
  }

  const eyeMat = new THREE.MeshBasicMaterial({color:0x2a2a2a});
  [-0.15,0.15].forEach(ex=>{
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8), eyeMat);
    eye.position.set(ex,0.5,0.75);
    g.add(eye);
  });
  return g;
}

function buildTartPrincess(){
  const g = new THREE.Group();
  const crust = new THREE.Mesh(new THREE.CylinderGeometry(0.65,0.7,0.22,14), new THREE.MeshStandardMaterial({color:0xd9a066, flatShading:true}));
  crust.position.y = 0.11; crust.castShadow = true;
  g.add(crust);

  const cream = new THREE.Mesh(new THREE.SphereGeometry(0.5,12,8,0,Math.PI*2,0,Math.PI/2), new THREE.MeshStandardMaterial({color:0xfff6e8, flatShading:true}));
  cream.position.y = 0.22; cream.castShadow = true;
  g.add(cream);

  const berryMat = new THREE.MeshStandardMaterial({color:0xd6304a, flatShading:true});
  for(let i=0;i<6;i++){
    const angle = (i/6)*Math.PI*2;
    const berry = new THREE.Mesh(new THREE.ConeGeometry(0.11,0.22,8), berryMat);
    berry.position.set(Math.cos(angle)*0.28, 0.55, Math.sin(angle)*0.28);
    berry.rotation.x = Math.PI;
    berry.castShadow = true;
    g.add(berry);
  }
  const crownBerry = new THREE.Mesh(new THREE.ConeGeometry(0.1,0.2,8), berryMat);
  crownBerry.position.y = 0.72;
  crownBerry.rotation.x = Math.PI;
  g.add(crownBerry);

  const eyeMat = new THREE.MeshBasicMaterial({color:0x2a2a2a});
  [-0.16,0.16].forEach(ex=>{
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8), eyeMat);
    eye.position.set(ex,0.32,0.66);
    g.add(eye);
  });
  return g;
}

const ENEMY_TYPES = [
  { name:'チョコおばけ',   color:0x4a2c17, build:buildChocoGhost,   baseHp:28, atk:4, catchMod:1.3 },
  { name:'ホールケーキ王', color:0xe0b83a, build:buildCakeKing,     baseHp:60, atk:8, catchMod:0.6 },
  { name:'ドーナツリング', color:0xe8a0c0, build:buildDonutRing,    baseHp:32, atk:5, catchMod:1.2 },
  { name:'いちごタルト姫', color:0xd6304a, build:buildTartPrincess, baseHp:38, atk:6, catchMod:1.0 },
];

const enemies = []; // {mesh, type, hp, maxHp, alive, wanderTarget, wanderTimer}

function spawnEnemy(x,z){
  const type = ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];
  const mesh = type.build();
  mesh.scale.set(1.3,1.3,1.3);
  mesh.position.set(x, 0, z);
  scene.add(mesh);

  const marker = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8), new THREE.MeshBasicMaterial({color:0xffe45e}));
  marker.position.y = 2.1;
  mesh.add(marker);

  enemies.push({
    mesh, type,
    hp: type.baseHp, maxHp: type.baseHp,
    alive: true,
    wanderTarget: new THREE.Vector3(x,0,z),
    wanderTimer: 0,
  });
}

/* =========================================================
   パーティ管理 + フィールドでの追従
========================================================= */
const TRAINER = { name:'あなた', color:0x2f6fd0, hp:40, maxHp:40, atk:7, isTrainer:true };
const party = []; // {name, color, hp, maxHp, atk, typeRef}
const MAX_PARTY = 6;
const fieldPartyModels = []; // partyと同じ並び順で追従用モデルを持つ

function getAllFighters(){ return [TRAINER, ...party]; }

function updatePartyPanel(){
  document.getElementById('party-count').textContent = party.length;
  const list = document.getElementById('party-list');
  const rows = getAllFighters().map(p => `
    <div class="party-member">
      <div class="party-dot" style="background:#${p.color.toString(16).padStart(6,'0')}"></div>
      <span>${p.name}${p.hp<=0?' (ひんし)':''}</span>
    </div>
  `).join('');
  list.innerHTML = rows || '<span style="color:#999;">まだ誰もいない…</span>';
}

function addFieldFollower(type){
  const m = type.build();
  m.scale.set(0.65,0.65,0.65);
  const angle = player.rotation.y;
  const behindDist = 1.3 * (fieldPartyModels.length + 1);
  m.position.set(
    player.position.x - Math.sin(angle)*behindDist,
    0,
    player.position.z - Math.cos(angle)*behindDist
  );
  scene.add(m);
  fieldPartyModels.push(m);
}

const FOLLOW_GAP = 1.3;
const FOLLOW_SPEED = PLAYER_SPEED * 1.15;

function updateFieldFollowers(dt){
  let leaderPos = player.position;
  for(const model of fieldPartyModels){
    const dx = leaderPos.x - model.position.x;
    const dz = leaderPos.z - model.position.z;
    const dist = Math.hypot(dx,dz);
    if(dist > FOLLOW_GAP){
      const move = Math.min(FOLLOW_SPEED*dt, dist-FOLLOW_GAP);
      model.position.x += (dx/dist)*move;
      model.position.z += (dz/dist)*move;
      model.rotation.y = Math.atan2(dx,dz);
    }
    model.position.y = Math.sin(performance.now()/400 + model.id)*0.05;
    leaderPos = model.position;
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=> t.style.opacity = '0', 2200);
}

/* =========================================================
   バトル用ミニ3Dステージ(敵が正面奥、パーティは手前に並ぶ)
========================================================= */
const battleCanvas = document.getElementById('battle-canvas');
const battleScene = new THREE.Scene();
const battleCamera = new THREE.PerspectiveCamera(42, 1, 0.1, 50);
battleCamera.position.set(0, 2.5, 4.6);
battleCamera.lookAt(0, 1.0, -1.2);
const battleRenderer = new THREE.WebGLRenderer({ canvas: battleCanvas, antialias:true, alpha:true });

const battleHemi = new THREE.HemisphereLight(0xffffff, 0xffd9ec, 1.0);
battleScene.add(battleHemi);
const battleSun = new THREE.DirectionalLight(0xffffff, 0.8);
battleSun.position.set(3,5,4);
battleScene.add(battleSun);
const battleFloor = new THREE.Mesh(new THREE.CircleGeometry(3.6,24), new THREE.MeshStandardMaterial({color:0xffffff, transparent:true, opacity:0.35}));
battleFloor.rotation.x = -Math.PI/2;
battleFloor.position.z = -0.5;
battleScene.add(battleFloor);

function resizeBattleCanvas(){
  const w = battleCanvas.clientWidth || 460;
  const h = battleCanvas.clientHeight || 210;
  battleRenderer.setSize(w, h, false);
  battleCamera.aspect = w / h;
  battleCamera.updateProjectionMatrix();
}

let allyModels = []; // 各要素.userData.fighter で対応するfighterを参照
let enemyBattleModel = null;

function clearBattleModels(){
  allyModels.forEach(m => battleScene.remove(m));
  allyModels = [];
  if(enemyBattleModel){ battleScene.remove(enemyBattleModel); enemyBattleModel = null; }
}

function placeBattleModels(){
  clearBattleModels();
  const fighters = getAllFighters();
  const n = fighters.length;
  const spacing = Math.min(1.05, 4.6 / Math.max(n,1));
  const scale = 0.6;

  fighters.forEach((f, i) => {
    const m = f.isTrainer ? buildTrainerModel() : f.typeRef.build();
    m.scale.set(scale, scale, scale);
    const xPos = (i - (n-1)/2) * spacing;
    m.position.set(xPos, 0, 1.4);
    m.rotation.y = Math.PI; // 奥の敵の方を向く(カメラには背中側が見える)
    m.userData.fighter = f;
    m.userData.baseScale = scale;
    battleScene.add(m);
    allyModels.push(m);
  });

  // 敵は正面(カメラ側)を向いて奥に立つ
  enemyBattleModel = battleState.enemy.type.build();
  enemyBattleModel.position.set(0, 0, -1.6);
  enemyBattleModel.rotation.y = 0;
  const bScale = battleState.enemy.type.battleScale || 1;
  enemyBattleModel.scale.set(bScale, bScale, bScale);
  enemyBattleModel.userData.baseScale = bScale;
  battleScene.add(enemyBattleModel);
}

// 攻撃モーション: 敵側でも味方側でも同じ関数を呼び出して再生する
function triggerAttackMotion(mesh, dir){
  if(!mesh) return;
  mesh.userData.atkAnim = { start: performance.now(), duration: 480, dir, baseX: mesh.position.x, baseZ: mesh.position.z };
}
function triggerHitReaction(mesh){
  if(!mesh) return;
  mesh.userData.hitAnim = { start: performance.now(), duration: 280 };
}

function updateAttackMotions(){
  const all = enemyBattleModel ? [...allyModels, enemyBattleModel] : [...allyModels];
  all.forEach(mesh => {
    if(!mesh) return;
    const baseScale = mesh.userData.baseScale || 1;
    if(mesh.userData.atkAnim){
      const a = mesh.userData.atkAnim;
      const t = Math.min(1, (performance.now() - a.start) / a.duration);
      const lunge = Math.sin(t * Math.PI) * 0.6;
      mesh.position.x = a.baseX + a.dir.x * lunge;
      mesh.position.z = a.baseZ + a.dir.z * lunge;
      const s = baseScale * (1 + Math.sin(t * Math.PI) * 0.1);
      mesh.scale.set(s, s, s);
      if(t >= 1){
        mesh.position.x = a.baseX; mesh.position.z = a.baseZ;
        mesh.scale.set(baseScale, baseScale, baseScale);
        delete mesh.userData.atkAnim;
      }
    } else if(mesh.userData.hitAnim){
      const h = mesh.userData.hitAnim;
      const t = Math.min(1, (performance.now() - h.start) / h.duration);
      const s = baseScale * (1 - Math.sin(t * Math.PI) * 0.15);
      mesh.scale.set(s, s, s);
      if(t >= 1){
        mesh.scale.set(baseScale, baseScale, baseScale);
        delete mesh.userData.hitAnim;
      }
    } else {
      mesh.position.y = Math.sin(performance.now()/450 + mesh.id) * 0.05;
    }
  });
}

/* =========================================================
   バトルシステム(全員参加)
========================================================= */
let battleState = null; // {enemy}
const ENCOUNTER_DIST = 1.6;

const overlay = document.getElementById('battle-overlay');
const btnAttack = document.getElementById('btn-attack');
const btnCapture = document.getElementById('btn-capture');
const btnRun = document.getElementById('btn-run');
const battleLog = document.getElementById('battle-log');

function log(msg){
  battleLog.innerHTML += `<div>${msg}</div>`;
  battleLog.scrollTop = battleLog.scrollHeight;
}
function wait(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

function setActionButtons(enabled){
  btnAttack.disabled = !enabled;
  btnCapture.disabled = !enabled;
  btnRun.disabled = !enabled;
}

function startBattle(enemy){
  battleState = { enemy };
  document.getElementById('battle-title').textContent = enemy.isBoss
    ? `ボスが たちふさがった！ ${enemy.type.name}`
    : `やせいの ${enemy.type.name} があらわれた！`;
  document.getElementById('enemy-name').textContent = enemy.type.name + (enemy.isBoss ? '(ボス)' : '');
  battleLog.innerHTML = '戦闘開始！';
  overlay.style.display = 'flex';
  resizeBattleCanvas();
  placeBattleModels();
  updateHpBar();
  updateAllyHpList();
  setActionButtons(true);
}

function updateHpBar(){
  const e = battleState.enemy;
  const pct = Math.max(0, e.hp / e.maxHp);
  const bar = document.getElementById('enemy-hpbar');
  bar.style.width = (pct*100) + '%';
  bar.className = 'hpbar-inner' + (pct < 0.25 ? ' critical' : pct < 0.5 ? ' low' : '');
  document.getElementById('enemy-hp-text').textContent = `${Math.max(0,Math.ceil(e.hp))}/${e.maxHp}`;
}

function updateAllyHpList(){
  const el = document.getElementById('ally-hp-list');
  el.innerHTML = getAllFighters().map(f => {
    const pct = Math.max(0, f.hp / f.maxHp);
    const cls = pct < 0.25 ? 'critical' : pct < 0.5 ? 'low' : '';
    return `
      <div class="ally-card${f.hp<=0?' fainted':''}">
        <div class="ally-card-dot" style="background:#${f.color.toString(16).padStart(6,'0')}"></div>
        <div class="ally-card-name">${f.name}</div>
        <div class="hpbar-outer"><div class="hpbar-inner ${cls}" style="width:${pct*100}%"></div></div>
        <div class="ally-card-atk">HP ${Math.max(0,Math.ceil(f.hp))}/${f.maxHp}</div>
      </div>`;
  }).join('');
}

function endBattle(){
  overlay.style.display = 'none';
  clearBattleModels();
  battleState = null;
  updatePartyPanel();
}

function findModelFor(fighter){
  return allyModels.find(m => m.userData.fighter === fighter);
}

function enemyCounterattack(){
  if(!battleState) return;
  const alive = getAllFighters().filter(f => f.hp > 0);
  if(alive.length === 0) return;
  const target = alive[Math.floor(Math.random()*alive.length)];
  const targetModel = findModelFor(target);
  triggerAttackMotion(enemyBattleModel, {x:0, z:1});
  setTimeout(() => {
    if(!battleState) return;
    const e = battleState.enemy;
    const dmg = Math.max(1, Math.round((e.type.atk||5) * (0.8 + Math.random()*0.4)));
    target.hp = Math.max(0, target.hp - dmg);
    log(`${e.type.name} の こうげき！ ${target.name} に ${dmg} のダメージ！`);
    triggerHitReaction(targetModel);
    updateAllyHpList();
    if(target.hp <= 0){
      log(`${target.name} は たおれた！`);
    }
    const stillAlive = getAllFighters().some(f => f.hp > 0);
    if(!stillAlive){
      log('みんな たおれてしまった…しまに はこばれた…');
      setActionButtons(false);
      setTimeout(() => {
        endBattle();
        openIslandOverlay();
      }, 1600);
    } else {
      setActionButtons(true);
    }
  }, 280);
}

btnAttack.addEventListener('click', async () => {
  if(!battleState || btnAttack.disabled) return;
  setActionButtons(false);

  const fighters = getAllFighters().filter(f => f.hp > 0);
  for(const f of fighters){
    if(!battleState) return;
    const model = findModelFor(f);
    triggerAttackMotion(model, {x:0, z:-1});
    await wait(180);
    if(!battleState) return;

    const e = battleState.enemy;
    const dmg = Math.max(1, Math.round(f.atk + Math.random()*5));
    e.hp -= dmg;
    log(`${f.name} の こうげき！ ${e.type.name} に ${dmg} のダメージ！`);
    triggerHitReaction(enemyBattleModel);
    updateHpBar();

    if(e.hp <= 0){
      log(`${e.type.name} をたおした！`);
      e.alive = false;
      scene.remove(e.mesh);
      if(e.isBoss){
        log('ステージクリア！');
        setTimeout(() => {
          endBattle();
          showToast('ステージクリア！ しまにもどってきた');
          openIslandOverlay();
        }, 1000);
      } else {
        setTimeout(endBattle, 900);
      }
      return;
    }
    await wait(200);
  }

  enemyCounterattack();
});

btnCapture.addEventListener('click', () => {
  if(!battleState || btnCapture.disabled) return;
  setActionButtons(false);
  const e = battleState.enemy;
  if(party.length >= MAX_PARTY){
    log('パーティがいっぱいだ！これ以上つかまえられない。');
    setActionButtons(true);
    return;
  }
  const hpPct = Math.max(0, e.hp / e.maxHp);
  const baseChance = 0.15 + (1 - hpPct) * 0.65;
  const chance = Math.min(0.95, baseChance * e.type.catchMod);
  log(`ボールをなげた！ (成功率 約${Math.round(chance*100)}%)`);

  document.getElementById('catch-flash').style.opacity = '0.6';
  setTimeout(()=> document.getElementById('catch-flash').style.opacity = '0', 150);

  const success = Math.random() < chance;
  setTimeout(() => {
    if(!battleState) return;
    if(success){
      log(`やった！ ${e.type.name} をつかまえた！`);
      party.push({
        name: e.type.name,
        color: e.type.color,
        hp: Math.round(e.type.baseHp * 0.8),
        maxHp: e.type.baseHp,
        atk: Math.round(4 + e.type.baseHp / 10),
        typeRef: e.type,
      });
      addFieldFollower(e.type);
      updatePartyPanel();
      showToast(`${e.type.name} が なかまになった！`);
      e.alive = false;
      scene.remove(e.mesh);
      setTimeout(endBattle, 900);
    } else {
      log(`あ！ボールから ${e.type.name} が でてしまった…`);
      enemyCounterattack();
    }
  }, 500);
});

btnRun.addEventListener('click', () => {
  if(!battleState || btnRun.disabled) return;
  setActionButtons(false);
  log('うまく にげきれた！');
  setTimeout(endBattle, 500);
});

/* =========================================================
   カメラ追従(見下ろし・フィールド探索時)
========================================================= */
function updateCamera(){
  const camOffset = new THREE.Vector3(0, 9, 7);
  const targetPos = player.position.clone().add(camOffset);
  camera.position.lerp(targetPos, 0.12);
  camera.lookAt(player.position.clone().add(new THREE.Vector3(0,0.6,0)));
}

/* =========================================================
   メインループ
========================================================= */
const clock = new THREE.Clock();

function checkCollision(x,z, radius){
  for(const o of obstacles){
    if(Math.hypot(x-o.x, z-o.z) < radius + o.r) return true;
  }
  return false;
}

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if(islandOverlayOpen){
    updateIslandPlayer(dt);
    islandRenderer.render(islandScene, islandCamera);
  } else if(!battleState){
    let dx=0, dz=0;
    if(keys['w']||keys['arrowup']) dz -= 1;
    if(keys['s']||keys['arrowdown']) dz += 1;
    if(keys['a']||keys['arrowleft']) dx -= 1;
    if(keys['d']||keys['arrowright']) dx += 1;

    if(dx!==0 || dz!==0){
      const len = Math.hypot(dx,dz);
      dx/=len; dz/=len;
      const nx = player.position.x + dx*PLAYER_SPEED*dt;
      const nz = player.position.z + dz*PLAYER_SPEED*dt;
      if(!checkCollision(nx,nz,0.5) && !collidesWithWalls(nx,nz,0.4)){
        player.position.x = nx;
        player.position.z = nz;
      }
      playerAngle = Math.atan2(dx,dz);
      player.rotation.y = playerAngle;
    }
    updateWalkAnimation(player, dt, dx!==0 || dz!==0);

    updateFieldFollowers(dt);

    for(const e of enemies){
      if(!e.alive) continue;
      e.wanderTimer -= dt;
      if(e.wanderTimer <= 0){
        e.wanderTimer = 2 + Math.random()*3;
        e.wanderTarget.set(
          e.mesh.position.x + (Math.random()-0.5)*6,
          0,
          e.mesh.position.z + (Math.random()-0.5)*6
        );
      }
      const dir = new THREE.Vector3(e.wanderTarget.x - e.mesh.position.x, 0, e.wanderTarget.z - e.mesh.position.z);
      if(dir.length() > 0.1){
        dir.normalize();
        const enx = e.mesh.position.x + dir.x * 1.2 * dt;
        const enz = e.mesh.position.z + dir.z * 1.2 * dt;
        if(!collidesWithWalls(enx, enz, 0.65)){
          e.mesh.position.x = enx;
          e.mesh.position.z = enz;
        } else {
          e.wanderTimer = 0; // 壁にぶつかったら次のフレームで新しい目標を選び直す
        }
        e.mesh.rotation.y = Math.atan2(dir.x, dir.z);
      }
      e.mesh.position.y = Math.sin(performance.now()/400 + e.mesh.id) * 0.08;

      const dist = Math.hypot(player.position.x - e.mesh.position.x, player.position.z - e.mesh.position.z);
      if(dist < ENCOUNTER_DIST){
        startBattle(e);
      }
    }

    for(const chest of chests){
      if(chest.opened) continue;
      const cd = Math.hypot(player.position.x - chest.mesh.position.x, player.position.z - chest.mesh.position.z);
      if(cd < 1.2){
        openChest(chest);
      }
    }
  } else {
    updateAttackMotions();
    battleRenderer.render(battleScene, battleCamera);
  }

  updateCamera();
  renderer.render(scene, camera);
}
animate();
