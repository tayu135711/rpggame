<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>捕獲RPGデモ</title>
<meta name="description" content="Three.js製の捕獲RPGデモ。フィールドを探索して電波人間を捕まえよう！">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

<!-- ゲームスタイルシート -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========================================================
     フィールドキャンバス
======================================================== -->
<div id="canvas-container"></div>

<!-- ========================================================
     HUD (フィールド操作ガイド)
======================================================== -->
<div id="hud" class="tag-panel">
  移動: WASD / 矢印キー<br>
  敵シンボルに近づくとエンカウント
</div>

<!-- ========================================================
     ミニマップ (フィールド右上・迷路探索時のみ表示)
======================================================== -->
<div id="minimap-wrap">
  <div id="minimap-floor-label" class="display">ステージ</div>
  <canvas id="minimap-canvas" width="140" height="140"></canvas>
  <button id="btn-minimap-zoom">🔍 拡大</button>
</div>

<!-- ミニマップ拡大表示 -->
<div id="minimap-zoom-overlay">
  <div id="minimap-zoom-box" class="tag-panel">
    <div id="minimap-zoom-title" class="display">ちず</div>
    <canvas id="minimap-zoom-canvas" width="340" height="340"></canvas>
    <button class="btn" id="btn-minimap-zoom-close">とじる</button>
  </div>
</div>

<!-- ========================================================
     パーティパネル (フィールド右上)
======================================================== -->
<div id="party-panel" class="tag-panel">
  <h3 class="display">パーティ (<span id="party-count">0</span>/6)</h3>
  <div id="party-list" style="color:#999;">まだ誰もいない…</div>
</div>

<!-- ========================================================
     バトルオーバーレイ
======================================================== -->
<div id="battle-overlay">
  <div id="battle-box" class="tag-panel">
    <div id="battle-title" class="display">やせいの ??? があらわれた！</div>

    <!-- バトル用ミニ3Dビュー -->
    <div id="battle-stage-wrap">
      <canvas id="battle-canvas"></canvas>
    </div>

    <!-- 敵HPバー -->
    <div class="hpbar-wrap">
      <div class="hpbar-label">
        <span id="enemy-name">敵</span>
        <span id="enemy-hp-text">0/0</span>
      </div>
      <div class="hpbar-outer">
        <div id="enemy-hpbar" class="hpbar-inner" style="width:100%"></div>
      </div>
    </div>

    <!-- 行動キュー (このラウンドでこれから行動するメンバー) -->
    <div id="battle-queue-wrap">
      <span class="queue-label display">こうどうじゅん</span>
      <div id="battle-queue-list" class="queue-list"></div>
    </div>

    <!-- 現在行動中のキャラ -->
    <div id="active-actor-label"></div>

    <!-- コマンドボタン (行動中のキャラによって出し分ける) -->
    <div id="battle-actions">
      <button class="btn cmd" id="btn-normal-atk">
        <span class="cmd-icon icon-attack"></span>
        <span>つうじょうこうげき</span>
      </button>
      <button class="btn cmd" id="btn-element-atk">
        <span class="cmd-icon icon-attack" id="element-atk-icon"></span>
        <span id="element-atk-text">属性こうげき</span>
      </button>
      <button class="btn cmd" id="btn-skill">
        <span class="cmd-icon icon-attack" id="skill-icon"></span>
        <span id="skill-text">とくぎ</span>
      </button>
      <button class="btn cmd capture-btn" id="btn-capture">
        <span class="cmd-icon icon-capture"></span>
        <span>つかまえる</span>
      </button>
      <button class="btn cmd" id="btn-run" style="background:#4a7ca8;">
        <span class="cmd-icon icon-run"></span>にげる
      </button>
    </div>

    <!-- 味方HPカードリスト -->
    <div id="ally-hp-list"></div>

    <!-- バトルログ -->
    <div id="battle-log">戦闘開始！</div>
  </div>
</div>

<!-- ========================================================
     島オーバーレイ (ステージ選択ハブ)
======================================================== -->
<div id="island-overlay">
  <div id="island-title" class="tag-panel display">しまマップ</div>
  <div id="island-hint">WASD / 矢印キー で あるける</div>

  <!-- 通貨表示 -->
  <div id="island-currency">
    <div class="currency-badge">
      <span class="icon-diamond"></span>
      <span id="diamond-count">0</span>
    </div>
    <div class="currency-badge">
      <span class="icon-coin"></span>
      <span id="coin-count">0</span>
    </div>
  </div>

  <!-- メニューボタン -->
  <div id="island-menu-buttons">
    <button class="btn" id="btn-open-gacha">ガチャ</button>
    <button class="btn" id="btn-open-party">パーティ</button>
  </div>

  <!-- 島3Dビュー -->
  <div id="island-canvas-wrap">
    <canvas id="island-canvas"></canvas>
  </div>

  <!-- ステージドット (右サイド) -->
  <div id="stage-dots"></div>

  <!-- ステージ選択カード (下部) -->
  <div id="stage-card" class="tag-panel">
    <div id="stage-card-icon">?</div>
    <div id="stage-card-name" class="display">ステージ1</div>
    <div id="stage-card-desc"></div>
    <button class="btn" id="btn-depart">出発する</button>
  </div>
</div>

<!-- ========================================================
     ガチャモーダル
======================================================== -->
<div id="gacha-modal">
  <div id="gacha-box" class="tag-panel">
    <div class="modal-title display">そうびガチャ</div>
    <div id="gacha-tabs">
      <button class="btn" id="tab-equip">そうびガチャ (コイン30)</button>
      <button class="btn" id="tab-premium">プレミアム (ダイヤ8)</button>
    </div>
    <div id="gacha-result">そうびガチャ: コインを30消費して、装備を1つひくよ</div>
    <button class="btn capture" id="btn-gacha-pull">ひく</button>
    <button class="btn" id="btn-gacha-close">とじる</button>
  </div>
</div>

<!-- ========================================================
     パーティ編成モーダル
======================================================== -->
<div id="party-modal">
  <div id="party-box" class="tag-panel">
    <div class="modal-title display" style="display:flex; justify-content:space-between; align-items:center;">
      <span>パーティへんせい</span>
      <button class="btn" id="btn-open-box" style="font-size:11px; padding:4px 8px; box-shadow:1.5px 1.5px 0 var(--ink);" onclick="renderBoxRoster()">ボックス</button>
    </div>
    <div id="party-roster"></div>
    <button class="btn" id="btn-party-close">とじる</button>
  </div>
</div>

<!-- ========================================================
     演出要素
======================================================== -->
<div id="catch-flash"></div>
<div id="toast"></div>

<!-- ========================================================
     JavaScript (読み込み順に注意)
     1. Three.js (外部ライブラリ)
     2. config.js     … 定数・ステージ定義
     3. models.js     … 3Dモデル生成 + ENEMY_TYPES
     4. maze.js       … 迷路生成・ステージセットアップ
     5. party.js      … パーティ管理・追従
     6. island.js     … 島シーン・ガチャ・通貨 (scene は main.js より先に必要なためDOMは参照するが、sceneはmain.jsで初期化後に使用)
     7. battle.js     … バトルシステム
     8. main.js       … メインシーン初期化・プレイヤー・ループ
======================================================== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- ポストプロセス(ブルーム)用アドオン -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="js/config.js"></script>
<script src="js/models.js"></script>
<script src="js/maze.js"></script>
<script src="js/party.js"></script>
<script src="js/island.js"></script>
<script src="js/battle.js"></script>
<script src="js/main.js"></script>

</body>
</html>
